root_path: auto
artifacts_root: "./artifacts"
host: "127.0.0.1"
port: 8080
planner:
  config_path: "FloodNet/configs/ldf_generate.yaml"
  chunk_frames: 40
  warmup_text: "stand still"
streaming:
  chunk_duration_sec: 2.0
  generation_fps: 20
  retarget_fps: 30
  runtime_fps: 50
  low_watermark_sec: 0.4
  target_buffer_sec: 1.2
retarget:
  apply_filter: true
  tgt_fps: 30
  xml_path: "MakeTrackingEasy/assets/g1_mocap_29dof.xml"
runtime:
  tracking_config: "motion_tracking/sim2real/config/tracking.yaml"
  backend: "shim"                     # "shim" (default) or "floodnet_file"
  # floodnet_output_dir: "./artifacts/floodnet"  # used when backend="floodnet_file"
  control_hz: 50
  low_watermark_frames: 20
  high_watermark_frames: 60
  future_horizon_frames: 16
